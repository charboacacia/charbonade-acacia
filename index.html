<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Acacia — Nouveau site bientôt disponible</title>
<meta name="description" content="Le nouveau site du Restaurant Acacia arrive bientôt.">
<!-- Page temporaire : à retirer dès la mise en ligne du site définitif (voir branche master) -->
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #F5EFE0;
    color: #1C1C1C;
    font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    text-align: center;
    padding: 2rem 1.25rem;
  }
  .card {
    max-width: 32rem;
  }
  .card img {
    height: 90px;
    width: auto;
    margin-bottom: 1.75rem;
  }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: clamp(1.8rem, 5vw, 2.4rem);
    margin: 0 0 0.75rem;
    color: #1C1C1C;
  }
  p.lede {
    margin: 0 0 2rem;
    color: #4a4a47;
    font-size: 1.05rem;
  }
  .contact {
    display: inline-flex;
    flex-direction: column;
    gap: 0.5rem;
    padding: 1.25rem 1.75rem;
    background: #FFFFFF;
    border-radius: 12px;
    box-shadow: 0 8px 28px rgba(28, 28, 28, 0.08);
    font-size: 0.95rem;
  }
  .contact a {
    color: #2D5A27;
    font-weight: 600;
    text-decoration: none;
  }
  .contact a:hover { text-decoration: underline; }
  .contact span { color: #6B6B6B; }
</style>
</head>
<body>
  <div class="card">
    <img src="/assets/logo.png" alt="Restaurant Acacia">
    <h1>Notre nouveau site arrive bientôt</h1>
    <p class="lede">En attendant, on vous accueille comme toujours au restaurant.</p>
    <div class="contact">
      <span>Rue Caroline 17, 1227 Les Acacias, Genève</span>
      <a href="tel:+41223435454">022 343 54 54</a>
    </div>
  </div>
</body>
</html>
